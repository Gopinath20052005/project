<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Audio Reader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="main-container">
    
    <div class="card">
        
        <div class="icon">
            📄🔊
        </div>

        <h1>PDF to Audio Reader</h1>
        <h2>Let's Get Started</h2>

        <p>
            Convert your PDF documents to natural-sounding audio in multiple languages
        </p>

        <form action="/convert" method="POST" enctype="multipart/form-data">
            <input type="file" name="pdf" required>
            <button type="submit">Let's Get Started</button>
        </form>

        <div class="features">
            <div>📁<span>PDF Upload</span></div>
            <div>🌍<span>Multilingual</span></div>
            <div>🎤<span>Voice Selection</span></div>
            <div>⬇️<span>Download</span></div>
        </div>

    </div>

</div>

</body>
</html>
