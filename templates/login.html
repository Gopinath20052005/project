<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Audio Reader</title>

    <style>
        body{
            margin:0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#4e54c8,#8f94fb,#ff416c);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:350px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            color:white;
        }

        h1{
            font-size:40px;
            margin-bottom:10px;
        }

        h2{
            margin:10px 0;
        }

        p{
            font-size:14px;
            margin-bottom:25px;
        }

        .btn{
            background: linear-gradient(45deg,#667eea,#764ba2);
            border:none;
            padding:12px 30px;
            border-radius:30px;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.1);
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        .features{
            margin-top:30px;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
        }

        .feature{
            background:rgba(255,255,255,0.2);
            padding:10px;
            border-radius:10px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <h1>📄🔊</h1>
    <h2>PDF to Audio Reader</h2>

    <p>Convert your PDF documents into clear and natural audio instantly</p>

    <button class="btn" onclick="redirectToHome()">
        🚀 Let's Get Started
    </button>

    <div class="features">
        <div class="feature">📁 Upload PDF</div>
        <div class="feature">🌍 Multilingual</div>
        <div class="feature">🎤 Voice Select</div>
        <div class="feature">⬇ Download MP3</div>
    </div>

</div>

<script>
function redirectToHome(){
    window.location.href="/home";
}
</script>

</body>
</html>
